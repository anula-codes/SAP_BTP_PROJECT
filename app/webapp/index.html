<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaBuild P2P Analytics</title>
    <script>
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            bootstrapPlugins: {
                "RuntimeAuthoringPlugin": { component: "sap.ushell.plugins.rta", config: { validateAppVersion: false } },
                "PersonalizePlugin": { component: "sap.ushell.plugins.rta-personalize", config: { validateAppVersion: false } }
            },
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            search: "hidden",
                            enableSearch: false,
                            rootIntent: "Shell-home"
                        }
                    }
                }
            },
            services: {
                LaunchPage: { factoryName: "sap.ushell.demotool.LaunchPageAdapter" },
                NavTargetResolution: { factoryName: "sap.ushell.services.NavTargetResolution" }
            }
        };
    </script>
    <script
        src="https://ui5.sap.com/1.120.x/test-resources/sap/ushell/bootstrap/sandbox.js"
        id="sap-ushell-bootstrap"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-language="EN"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{"novabuild.p2p.analytics": "./"}'
        data-sap-ui-appCacheBuster="./"
        data-sap-ui-preload="async"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-onInit="module:sap/ushell/bootstrap/sandbox"
    ></script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
